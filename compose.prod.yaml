services:
  dice:
    build:
      context: .
    container_name: dice
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3001
      LOG_DIR: /data
    volumes:
      - dice-data:/data

volumes:
  dice-data:
    name: dice-data
